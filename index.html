<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const SEPOLIA = {
  chainId: 11155111,
  chainIdHex: "0xaa36a7",
  name: "Sepolia Testnet",
  rpc: "https://rpc.sepolia.org",
  rpcFallback: "https://ethereum-sepolia-rpc.publicnode.com",
  explorer: "https://sepolia.etherscan.io",
  // Etherscan API — free tier, no key needed for basic balance reads
  etherscanApi: "https://api-sepolia.etherscan.io/api",
  nativeCurrency: { name:"Sepolia ETH", symbol:"ETH", decimals:18 },
};

// Well-known Sepolia ERC-20 test tokens
const TOKENS_META = {
  USDC: { address:"0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238", decimals:6  },
  USDT: { address:"0x7169D38820dfd117C3FA1f22a697dBA58d90BA06", decimals:6  },
  DAI:  { address:"0x68194a729C2450ad26072b3D33ADaCbcef39D574", decimals:18 },
};

const VAULTS = [
  { id:"7d",   label:"7-Day",   days:7,   color:"#F5E882", dim:"#5a4f00", apy:5.2,  alloc:20 },
  { id:"30d",  label:"30-Day",  days:30,  color:"#EAB308", dim:"#713f12", apy:6.8,  alloc:25 },
  { id:"90d",  label:"90-Day",  days:90,  color:"#F97316", dim:"#7c2d12", apy:8.4,  alloc:25 },
  { id:"180d", label:"180-Day", days:180, color:"#FB923C", dim:"#431407", apy:10.1, alloc:30 },
];
const PROFILES = {
  conservative: { name:"Conservative", icon:"🛡️", allocs:[40,30,20,10] },
  balanced:     { name:"Balanced",     icon:"⚖️", allocs:[20,25,25,30] },
  aggressive:   { name:"Aggressive",   icon:"🚀", allocs:[10,15,30,45] },
};
const PAYOUT_MODES = [
  { id:"compound", label:"Compound",       icon:"🔄", desc:"Reinvest all yield automatically"  },
  { id:"monthly",  label:"Monthly Income", icon:"💸", desc:"Withdraw yield to wallet monthly"  },
  { id:"hybrid",   label:"Hybrid",         icon:"✂️", desc:"50% reinvested, 50% paid out"     },
];
const blendedAPY = a => VAULTS.reduce((s,v,i) => s + v.apy * a[i] / 100, 0);

// ─── Formatting ───────────────────────────────────────────────────────────────
const fmt    = (n, d=2) => Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtUSD = n => `$${fmt(n)}`;
const fmtETH = n => `${fmt(n,4)} ETH`;
const fmtPct = n => `${fmt(n,1)}%`;
const short  = a => a ? `${a.slice(0,6)}…${a.slice(-4)}` : "";

// ─── On-chain helpers ─────────────────────────────────────────────────────────
async function rpcCall(method, params=[]) {
  for (const url of [SEPOLIA.rpc, SEPOLIA.rpcFallback]) {
    try {
      const r = await fetch(url, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ jsonrpc:"2.0", id:1, method, params }),
      });
      const j = await r.json();
      if (j.result !== undefined) return j.result;
    } catch { /* try fallback */ }
  }
  return null;
}

// Use Etherscan API for accurate ETH balance (same source Metamask uses)
async function getEthBalance(address) {
  try {
    const url = `${SEPOLIA.etherscanApi}?module=account&action=balance&address=${address}&tag=latest`;
    const r = await fetch(url);
    const j = await r.json();
    if (j.status === "1" && j.result) {
      return Number(BigInt(j.result)) / 1e18;
    }
  } catch {}
  // fallback to direct RPC
  try {
    const hex = await rpcCall("eth_getBalance", [address, "latest"]);
    return hex ? Number(BigInt(hex)) / 1e18 : 0;
  } catch { return 0; }
}

// Use Etherscan tokenbalance API for accurate ERC-20 balances
async function getErc20Balance(address, tokenAddress, decimals) {
  try {
    const url = `${SEPOLIA.etherscanApi}?module=account&action=tokenbalance&contractaddress=${tokenAddress}&address=${address}&tag=latest`;
    const r = await fetch(url);
    const j = await r.json();
    if (j.status === "1" && j.result) {
      return Number(BigInt(j.result)) / Math.pow(10, decimals);
    }
  } catch {}
  // fallback to direct RPC eth_call
  try {
    const data = "0x70a08231" + address.replace("0x","").padStart(64,"0");
    const hex = await rpcCall("eth_call", [{ to:tokenAddress, data }, "latest"]);
    if (hex && hex !== "0x") return Number(BigInt(hex)) / Math.pow(10, decimals);
  } catch {}
  return 0;
}

async function fetchBalances(address) {
  const [eth, usdc, usdt, dai] = await Promise.all([
    getEthBalance(address),
    getErc20Balance(address, TOKENS_META.USDC.address, TOKENS_META.USDC.decimals),
    getErc20Balance(address, TOKENS_META.USDT.address, TOKENS_META.USDT.decimals),
    getErc20Balance(address, TOKENS_META.DAI.address,  TOKENS_META.DAI.decimals),
  ]);
  return { eth, USDC:usdc, USDT:usdt, DAI:dai };
}

async function getChainId(provider) {
  const hex = await provider.request({ method:"eth_chainId" });
  return parseInt(hex, 16);
}

async function switchToSepolia(provider) {
  try {
    await provider.request({ method:"wallet_switchEthereumChain", params:[{ chainId:SEPOLIA.chainIdHex }] });
    return true;
  } catch (err) {
    if (err.code === 4902 || err.code === -32603) {
      try {
        await provider.request({
          method:"wallet_addEthereumChain",
          params:[{
            chainId: SEPOLIA.chainIdHex,
            chainName: "Sepolia Testnet",
            nativeCurrency: SEPOLIA.nativeCurrency,
            rpcUrls: [SEPOLIA.rpc, SEPOLIA.rpcFallback],
            blockExplorerUrls: [SEPOLIA.explorer],
          }],
        });
        return true;
      } catch { return false; }
    }
    return false;
  }
}

// ─── UTC Clock ────────────────────────────────────────────────────────────────
function UTCClock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const iv = setInterval(() => setT(new Date()), 1000); return () => clearInterval(iv); }, []);
  const p = n => String(n).padStart(2,"0");
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return (
    <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#a0926a",letterSpacing:1,display:"flex",gap:6,alignItems:"center"}}>
      <span>{M[t.getUTCMonth()]} {p(t.getUTCDate())}, {t.getUTCFullYear()}</span>
      <span style={{color:"#3a2e0a"}}>|</span>
      <span style={{color:"#F5E882"}}>{p(t.getUTCHours())}:{p(t.getUTCMinutes())}:{p(t.getUTCSeconds())}</span>
      <span style={{color:"#5a4a20",fontSize:9}}>UTC</span>
    </div>
  );
}

// ─── Copy Address Button ──────────────────────────────────────────────────────
function CopyAddressBtn({ address }) {
  const [copied, setCopied] = useState(false);
  const doCopy = async () => {
    try {
      await navigator.clipboard.writeText(address);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {
      // fallback
      const el = document.createElement("textarea");
      el.value = address;
      document.body.appendChild(el);
      el.select();
      document.execCommand("copy");
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }
  };
  return (
    <button className={`copy-btn${copied ? " copied" : ""}`} onClick={doCopy} title="Copy wallet address">
      {copied ? (
        <>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Copied!
        </>
      ) : (
        <>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy Address
        </>
      )}
    </button>
  );
}

          <rect x="22"   y="22"   width="9" height="9" rx="1.5" fill="white"/>
        </svg>
      ),
    },
  ];

  const detectProvider = id => {
    if (typeof window === "undefined") return null;
    if (id === "metamask") {
      const providers = window.ethereum?.providers ?? [];
      const mm = providers.find(p => p.isMetaMask && !p.isOKExWallet && !p.isOKXWallet);
      if (mm) return mm;
      if (window.ethereum?.isMetaMask && !window.ethereum?.isOKExWallet && !window.ethereum?.isOKXWallet)
        return window.ethereum;
      return null;
    }
    if (id === "okx") {
      if (window.okxwallet) return window.okxwallet;
      const providers = window.ethereum?.providers ?? [];
      const okx = providers.find(p => p.isOKExWallet || p.isOKXWallet);
      if (okx) return okx;
      if (window.ethereum?.isOKExWallet || window.ethereum?.isOKXWallet) return window.ethereum;
      return null;
    }
    return null;
  };

      const balances = await fetchBalances(address);

      setConnecting(null);
      onConnect({ wallet, address, provider, balances });

      setConnecting(null);
      if (err.code === 4001) setError("Request rejected — you cancelled in the wallet.");
      else setError(err.message || "Connection failed. Please try again.");
    }
  };

          {/* Network info row */}

              <div style={{width:8,height:8,borderRadius:"50%",background:"#4ADE80",boxShadow:"0 0 6px #4ADE80"}}/>

              onMouseLeave={e=>{e.currentTarget.style.borderColor="#3a2e0a";e.currentTarget.style.color="#a0926a";}}
            >How to add network?</button>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {WALLETS.map(w => {
              const isBusy = connecting === w.id;
              return (
                <button key={w.id} className="wallet-opt" onClick={() => connect(w)} disabled={!!connecting}>
                  {isBusy
                    ? <div style={{width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:24,height:24,border:"3px solid #3a2e0a",borderTopColor:"#F5E882",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>

// ─── Notification ─────────────────────────────────────────────────────────────
function Notification({ n }) {
  if (!n) return null;
  const c = { success:"#4ADE80", error:"#F87171", warn:"#FBBF24", info:"#F5E882" };
  return (
    <div className="notif" style={{border:`1px solid ${c[n.type]||c.success}`,boxShadow:`0 0 24px ${c[n.type]||c.success}28`}}>
      {n.msg}
    </div>
  );
}

function DonutChart({ allocs }) {
  const sz=130,cx=65,cy=65,r=48,sw=15,c=2*Math.PI*r;
  let o=0;
  const segs = VAULTS.map((v,i) => { const p=allocs[i]/100,d={v,dash:p*c,gap:(1-p)*c,o}; o+=p*c; return d; });
  return (
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1a1608" strokeWidth={sw}/>
      {segs.map(({v,dash,gap,o:off},i) => (
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={v.color} strokeWidth={sw}
          strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off+c/4}
          style={{filter:`drop-shadow(0 0 4px ${v.color}55)`}}/>
      ))}
      <text x={cx} y={cy-5}  textAnchor="middle" fill="#a0926a" fontSize={9}  fontFamily="monospace">BLEND</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#F5E882" fontSize={14} fontWeight="bold" fontFamily="'DM Serif Display',serif">{fmtPct(blendedAPY(allocs))}</text>
    </svg>
  );
}

function MaturityTimeline({ allocs }) {
  const now = new Date();
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return (
    <div style={{padding:"14px 0",position:"relative"}}>
      <div style={{position:"absolute",left:0,right:0,top:20,height:1,background:"#2a2008"}}/>
      <div style={{display:"flex",justifyContent:"space-between",position:"relative"}}>
        {VAULTS.map((v,i) => {
          const d = new Date(now); d.setDate(d.getDate()+v.days);
          return (
            <div key={v.id} style={{display:"flex",flexDirection:"column",alignItems:"center",width:"24%"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:v.color,boxShadow:`0 0 8px ${v.color}`,zIndex:1,marginBottom:7}}/>
              <div style={{fontSize:10,color:v.color,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace"}}>{v.label}</div>
              <div style={{fontSize:9,color:"#5a4a20",marginTop:1}}>{M[d.getUTCMonth()]} {String(d.getUTCDate()).padStart(2,"0")}</div>
              <div style={{fontSize:9,color:"#3a2e0a",marginTop:1}}>{allocs[i]}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [page,        setPage]        = useState("home");
  const [showModal,   setShowModal]   = useState(false);
  const [walletInfo,  setWalletInfo]  = useState(null);
  const [wrongChain,  setWrongChain]  = useState(false);
  const [deposited,   setDeposited]   = useState(0);
  const [earnings,    setEarnings]    = useState(0);
  const [depositAmt,  setDepositAmt]  = useState("");
  const [token,       setToken]       = useState("USDC");
  const [profile,     setProfile]     = useState("balanced");
  const [payout,      setPayout]      = useState("compound");
  const [txPending,   setTxPending]   = useState(false);
  const [txDone,      setTxDone]      = useState(false);
  const [animated,    setAnimated]    = useState(false);
  const [safeMode,    setSafeMode]    = useState(false);
  const [withdrawAmt, setWithdrawAmt] = useState("");
  const [notif,       setNotif]       = useState(null);

  const allocs = PROFILES[profile].allocs;
  const apy    = blendedAPY(allocs);

  // Live yield accrual
  useEffect(() => {
    if (!deposited) return;
    const iv = setInterval(() => setEarnings(e => e + deposited*(apy/100)/365/24/60), 1000);
    return () => clearInterval(iv);
  }, [deposited, apy]);

  useEffect(() => { if (page === "dashboard") setAnimated(true); }, [page]);

  // Chain change listener
  useEffect(() => {
    if (!walletInfo?.provider) return;
    const p = walletInfo.provider;
    const h = hex => setWrongChain(parseInt(hex,16) !== SEPOLIA.chainId);
    p.on?.("chainChanged", h);
    return () => p.removeListener?.("chainChanged", h);
  }, [walletInfo?.provider]);

  const notify = useCallback((msg, type="success") => {
    setNotif({msg,type});
    setTimeout(() => setNotif(null), 4200);
  }, []);

  const handleConnect = async info => {
    setWalletInfo(info);
    setShowModal(false);
    setWrongChain(false);
    const { eth, USDC, USDT, DAI } = info.balances;
    notify(`✓ ${info.wallet.name} connected · ${fmtETH(eth)} · ${fmtUSD(USDC+USDT+DAI)} stables`, "info");
  };

  const handleDisconnect = () => {
    setWalletInfo(null);
    setWrongChain(false);
    setDeposited(0);
    setEarnings(0);
    setPage("home");
    notify("Wallet disconnected", "warn");
  };

  const refreshBalances = async () => {
    if (!walletInfo) return;
    const balances = await fetchBalances(walletInfo.address);
    setWalletInfo(w => ({...w, balances}));
    notify("Balances refreshed from Sepolia", "info");
  };

  const handleSwitched = async () => {
    setWrongChain(false);
    const balances = await fetchBalances(walletInfo.address);
    setWalletInfo(w => ({...w, balances}));
    notify("✓ Switched to Sepolia", "success");
  };

  const available = walletInfo ? (walletInfo.balances[token] ?? 0) : 0;

  const handleDeposit = async () => {
    const amt = parseFloat(depositAmt);
    if (!amt || amt <= 0) return notify("Enter a valid amount","error");
    if (!walletInfo) { setShowModal(true); return; }
    if (wrongChain) return notify("Switch to Sepolia first","error");
    if (amt > available) return notify(`Insufficient ${token} — available: ${fmtUSD(available)}`,"error");
    if (!walletInfo.provider) return notify("No wallet provider found","error");

    setTxPending(true);
    try {
      // Build ERC-20 transfer to LadderFi vault address (using zero address as demo target)
      // For real deployment replace VAULT_ADDRESS with actual Concrete vault contract
      const VAULT_ADDRESS = "0x0000000000000000000000000000000000000001";
      const tokenMeta = TOKENS_META[token];
      const decimals = tokenMeta.decimals;
      // Convert amount to token smallest unit (BigInt safe)
      const rawAmt = BigInt(Math.round(amt * Math.pow(10, decimals)));
      // ERC-20 transfer(address,uint256) selector = 0xa9059cbb
      const paddedTo   = VAULT_ADDRESS.replace("0x","").padStart(64,"0");
      const paddedAmt  = rawAmt.toString(16).padStart(64,"0");
      const data = "0xa9059cbb" + paddedTo + paddedAmt;

      notify("⏳ Confirm transaction in your wallet…", "info");

      // This triggers the real MetaMask / OKX popup
      const txHash = await walletInfo.provider.request({
        method: "eth_sendTransaction",
        params: [{
          from: walletInfo.address,
          to:   tokenMeta.address,   // token contract
          data,
          // Let the wallet estimate gas
        }],
      });

      notify(`⏳ Transaction sent · waiting for confirmation…`, "info");

      // Poll for receipt (max 60s)
      let receipt = null;
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        const res = await rpcCall("eth_getTransactionReceipt", [txHash]);
        if (res && res.status) { receipt = res; break; }
        if (res && res.status === "0x0") throw new Error("Transaction reverted on-chain.");
      }
      if (!receipt) throw new Error("Transaction not confirmed within 60 seconds. Check Etherscan.");

      // Re-fetch balances from Etherscan to get accurate on-chain values
      notify("✓ Confirmed! Refreshing balances…", "success");
      const freshBalances = await fetchBalances(walletInfo.address);
      setWalletInfo(w => ({...w, balances: freshBalances}));

      setDeposited(amt);
      setEarnings(0);
      setTxPending(false);
      setTxDone(true);
      setTimeout(() => {
        setTxDone(false);
        setPage("dashboard");
        notify(`✓ ${fmtUSD(amt)} ${token} deployed · Tx: ${txHash.slice(0,10)}…`);
      }, 1200);

    } catch (err) {
      setTxPending(false);
      if (err.code === 4001) notify("Transaction cancelled by user.", "warn");
      else notify(`Transaction failed: ${err.message || "unknown error"}`, "error");
    }
  };

  const handleWithdraw = async () => {
    const amt = parseFloat(withdrawAmt);

    setTimeout(async () => {

      setWithdrawAmt("");
      setTxPending(false);
      // Re-fetch real on-chain balances to reflect returned funds
      if (walletInfo) {

              color:       txPending||!depositAmt||wrongChain ? "#3a2e0a" : "#0a0900",
              borderColor: txPending||!depositAmt||wrongChain ? "#2a2008" : "#F5E882",
              boxShadow:   txPending||!depositAmt||wrongChain ? "none" : "0 0 18px rgba(245,232,130,.25)",
            }}>
              {wrongChain ? "⚠️ Switch to Sepolia First"
                : txPending ? <><span className="spinner dark"/>Deploying…</>
                : `Deploy ${depositAmt?fmtUSD(parseFloat(depositAmt)||0):""} ${token} →`}
            </button>
          )}
          <div style={{fontSize:10,color:"#2a2008",marginTop:10,textAlign:"center",fontFamily:"'IBM Plex Mono',monospace"}}>
            Sepolia Testnet · ERC-4626 Vaults · Powered by Concrete
          </div>
        </div>

        {/* Right: Preview */}
        <div>
          <div className="panel" style={{position:"sticky",top:80}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <span style={{fontSize:11,color:"#5a4a20",textTransform:"uppercase",letterSpacing:2,fontFamily:"'IBM Plex Mono',monospace"}}>Live Preview</span>
              <div style={{display:"flex",gap:6}}>
                <span style={{fontSize:10,color:"#4ADE80",background:"#0d1a0d",border:"1px solid #166534",borderRadius:20,padding:"2px 9px",fontFamily:"'IBM Plex Mono',monospace"}}>Sepolia</span>
                <span style={{fontSize:10,color:"#F5E882",background:"#1e1a08",border:"1px solid #3a2e0a",borderRadius:20,padding:"2px 9px",fontFamily:"'IBM Plex Mono',monospace",animation:"pulse 2s infinite"}}>● LIVE</span>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{fontSize:11,color:"#5a4a20"}}>Deposit Amount</div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:26,fontWeight:800,color:"#F5F5F0"}}>
                  {depositAmt ? fmtUSD(parseFloat(depositAmt)||0) : "$0.00"}
                </div>
              </div>
              <DonutChart allocs={allocs}/>
            </div>
            {VAULTS.map((v,i) => <LadderBar key={v.id} vault={v} alloc={allocs[i]} animated={true}/>)}
            <div style={{borderTop:"1px solid #1a1608",paddingTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[
                {l:"Blended APY",   v:fmtPct(apy),                                                     c:"#F5E882"},
                {l:"Monthly Est.", v:depositAmt?fmtUSD(parseFloat(depositAmt||0)*apy/100/12):"$0.00",  c:"#F5F5F0"},
                {l:"Annual Est.",  v:depositAmt?fmtUSD(parseFloat(depositAmt||0)*apy/100):"$0.00",     c:"#F5F5F0"},
                {l:"First Maturity",v:"7 days",                                                         c:"#F5F5F0"},
              ].map(s => (
                <div key={s.l}>
                  <div style={{fontSize:9,color:"#3a2e0a",textTransform:"uppercase",letterSpacing:1,fontFamily:"'IBM Plex Mono',monospace"}}>{s.l}</div>
                  <div style={{fontSize:18,fontWeight:800,color:s.c,fontFamily:"'DM Serif Display',serif"}}>{s.v}</div>
                </div>
              ))}
            </div>
            <MaturityTimeline allocs={allocs}/>
          </div>
        </div>
      </div>
    </div>
  );

  // ── DASHBOARD ─────────────────────────────────────────────────────────────────
  return (
    <div className="page-root">
      {showModal && <WalletModal onConnect={handleConnect} onClose={() => setShowModal(false)}/>}
      <Notification n={notif}/>
      <Navbar/>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:22,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:10,color:"#3a2e0a",textTransform:"uppercase",letterSpacing:2,marginBottom:3,fontFamily:"'IBM Plex Mono',monospace"}}>Portfolio · Sepolia Testnet</div>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:30,color:"#F5F5F0",margin:0}}>Your Yield Ladder</h2>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {safeMode && <div style={{background:"#1a1407",border:"1px solid #FBBF24",color:"#FBBF24",padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700}}>🛡️ Safe Mode</div>}
            <button className="btn-ghost" style={{borderColor:safeMode?"#FBBF24":"#2a2008",color:safeMode?"#FBBF24":"#5a4a20"}}
              onClick={() => { setSafeMode(s=>!s); notify(safeMode?"Safe mode off":"⚠️ Emergency safe mode ON",safeMode?"success":"warn"); }}>
              🛡️ Safe Mode
            </button>
            {walletInfo && (
              <a href={`${SEPOLIA.explorer}/address/${walletInfo.address}`} target="_blank" rel="noopener noreferrer" className="btn-ghost" style={{textDecoration:"none",fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>
                Etherscan ↗
              </a>
            )}
          </div>
        </div>

        {/* Stats */}
        <div className="stats-6" style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}}>
          {[
            {l:"Total Deposited",   v:fmtUSD(deposited),                              s:`${token} · ${PROFILES[profile].name}`},
            {l:"Accrued Earnings",  v:fmtUSD(earnings),                               s:"Live accrual", a:"#4ADE80"},
            {l:"Blended APY",       v:fmtPct(safeMode?5.2:apy),                       s:safeMode?"Safe mode":"All tranches", a:"#F5E882"},
            {l:"Projected Monthly", v:fmtUSD(deposited*(safeMode?5.2:apy)/100/12),    s:"At current rates"},
            {l:"Portfolio Value",   v:fmtUSD(deposited+earnings),                      s:"Principal + yield", a:"#EAB308"},
            {l:"Wallet Balance",    v:fmtUSD(walletInfo?.balances[token]||0),          s:`${token} on Sepolia`, a:"#F5E882", href:walletInfo?`${SEPOLIA.explorer}/address/${walletInfo.address}`:null},
          ].map(s => (
            <div key={s.l} className="stat-card" style={{cursor:s.href?"pointer":"default"}} onClick={() => s.href && window.open(s.href,"_blank")}>
              <div className="stat-card-lbl">{s.l}</div>
              <div className="stat-card-val" style={{color:s.a||"#F5F5F0"}}>{s.v}</div>
              {s.s && <div className="stat-card-sub">{s.s}</div>}
            </div>
          ))}
        </div>

        <div className="dash-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          {/* Allocation */}
          <div className="panel">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div className="panel-title">Ladder Allocation</div>
              <DonutChart allocs={safeMode?[100,0,0,0]:allocs}/>
            </div>
            {VAULTS.map((v,i) => {
              const a = safeMode ? (i===0?100:0) : allocs[i];
              const amt = deposited * a / 100;
              return (
                <div key={v.id} style={{marginBottom:12}}>
                  <LadderBar vault={v} alloc={a} animated={animated}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#3a2e0a",marginTop:1}}>
                    <span>{fmtUSD(amt)}</span>
                    <span>+{fmtUSD(amt*v.apy/100/12)}/mo</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div className="panel">
              <div className="panel-title" style={{marginBottom:12}}>Maturity Timeline</div>
              <MaturityTimeline allocs={safeMode?[100,0,0,0]:allocs}/>
            </div>

            <div className="panel">
              <div className="panel-title" style={{marginBottom:10}}>Quick Withdrawal</div>
              <div style={{fontSize:12,color:"#5a4a20",marginBottom:10}}>Withdraws from 7-day vault first. Funds return to Sepolia wallet.</div>
              <div style={{display:"flex",gap:8,marginBottom:7}}>
                <input type="number" placeholder="Amount" value={withdrawAmt} onChange={e=>setWithdrawAmt(e.target.value)} className="form-input" style={{flex:1,fontSize:14}}/>
                <button onClick={handleWithdraw} disabled={txPending} style={{background:"#1e1a08",border:"1px solid #F5E882",color:"#F5E882",padding:"9px 15px",borderRadius:8,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,display:"flex",alignItems:"center"}}>
                  {txPending ? <span className="spinner" style={{margin:0}}/> : "Withdraw"}
                </button>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[0.25,0.5,1].map(f => (
                  <button key={f} className="preset-btn" onClick={() => setWithdrawAmt((deposited*f*allocs[0]/100).toFixed(2))}>
                    {f*100}% of 7d
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Activity */}
        <div className="panel" style={{marginTop:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div className="panel-title">Auto-Rollover Activity</div>
            <a href={walletInfo?`${SEPOLIA.explorer}/address/${walletInfo.address}`:SEPOLIA.explorer} target="_blank" rel="noopener noreferrer"
               style={{fontSize:10,color:"#a0926a",textDecoration:"none",fontFamily:"'IBM Plex Mono',monospace",borderBottom:"1px solid #3a2e0a",transition:"color .15s"}}
               onMouseEnter={e=>e.currentTarget.style.color="#F5E882"}
               onMouseLeave={e=>e.currentTarget.style.color="#a0926a"}
            >View on Etherscan ↗</a>
          </div>
          {[
            {t:"Just now",  e:"🔄", m:`7-day vault matured — redeployed ${fmtUSD(deposited*0.2)} at ${VAULTS[0].apy}% APY`},
            {t:"2h ago",    e:"📊", m:"Yield accrual updated across all Concrete vaults"},
            {t:"Yesterday", e:"🔄", m:`30-day rollover — rate held at ${VAULTS[1].apy}% APY`},
            {t:"3d ago",    e:"⚡", m:"Dynamic rebalance — 90d tranche +3% (rate premium detected)"},
            {t:"1wk ago",   e:"💰", m:`Initial deposit: ${fmtUSD(deposited)} ${token} deployed across all tranches`},
          ].map((a,i) => (
            <div key={i} className="activity-row">
              <span style={{fontSize:16}}>{a.e}</span>
              <span style={{fontSize:12,color:"#a0926a",flex:1}}>{a.m}</span>
              <span style={{fontSize:10,color:"#3a2e0a",fontFamily:"'IBM Plex Mono',monospace"}}>{a.t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
